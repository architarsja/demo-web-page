<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beauty Banner</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#ffffff;
    }

    .banner{
      width:100%;
      height:100vh;
      background:#f7f4f4;
      display:flex;
      align-items:center;
      justify-content:space-between;
      overflow:hidden;
    }

    /* LEFT SIDE */
    .left{
      width:58%;
      height:100%;
      position:relative;
      overflow:hidden;
    }

    .left img{
      width:100%;
      height:100%;
      object-fit:content;
    }

    /* RIGHT SIDE */
    .right{
      width:42%;
      padding:80px;
      background:#f7f4f4;
    }

    .right h1{
      font-size:60px;
      font-family: "Brush Script MT", cursive;
      font-weight:normal;
      line-height:1.2;
      color:#222;
      margin-bottom:25px;
    }

    .line{
      width:55px;
      height:2px;
      background:#222;
      margin-bottom:30px;
    }

    .right p{
      width:320px;
      font-size:15px;
      line-height:1.8;
      color:#555;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      background:#000;
      color:#fff;
      text-decoration:none;
      padding:15px 32px;
      letter-spacing:2px;
      font-size:12px;
      transition:0.3s;
    }

    .btn:hover{
      background:#333;
    }

    /* RESPONSIVE */
    @media(max-width:900px){

      .banner{
        flex-direction:column;
        height:auto;
      }

      .left{
        width:100%;
        height:400px;
      }

      .right{
        width:100%;
        padding:40px 25px;
      }

      .right h1{
        font-size:45px;
      }

      .right p{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <section class="banner">

    <div class="left">
      <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1400&auto=format&fit=crop" alt="Beauty Products">
    </div>

    <div class="right">
      <h1>
        What products do <br>
        you have?
      </h1>

      <div class="line"></div>

      <p>
        Every single ingredient you put on your skin is
        information, every ingredient contains messages that
        communicate to every single cell in your skin.
      </p>

      <a href="#" class="btn">LEARN MORE</a>
    </div>

  </section>

</body>
</html>
